{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>

{% for card in cards %}
    <div class="card">
        <h3>{{ card.title }}</h3>
        <p>{{ card.subtitle }}</p>
        <a href="/card/{{ card.id }}">Ver mais</a>
    </div>
{% endfor %}

<p class="error">{{ error }}</p>

<a href="/reg">Criar conta</a>
{% endblock %}
